{% extends "base.html" %}
{% block content %}

<div class="confirm-box">
  <div class="check">✓</div>
  <h2>Booking Confirmed!</h2>
  <p>Thank you, {{ name }}! Your reservation has been received. A confirmation has been sent to {{ email }}.</p>

  <div class="detail-grid">
    <div class="detail-row"><span class="label">Room</span><span class="value">{{ room_type }}</span></div>
    <div class="detail-row"><span class="label">Check-in</span><span class="value">{{ checkin }}</span></div>
    <div class="detail-row"><span class="label">Check-out</span><span class="value">{{ checkout }}</span></div>
    <div class="detail-row"><span class="label">Guests</span><span class="value">{{ guests }}</span></div>
  </div>

  <a href="/" class="btn">Back to Home</a>
</div>

{% endblock %}
