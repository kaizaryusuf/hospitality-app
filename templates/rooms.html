{% extends "base.html" %}
{% block content %}

<section class="rooms-section">
  <h2>Our Rooms & Suites</h2>
  <div class="card-grid">
    {% for room in rooms %}
    <div class="room-card">
      <div class="room-img">🛏️</div>
      <div class="room-info">
        <h3>{{ room.name }}</h3>
        <p>{{ room.desc }}</p>
        <div class="price">₹{{ room.price }} <span>/ night</span></div>
        <a href="/booking" class="btn">Book This Room</a>
      </div>
    </div>
    {% endfor %}
  </div>
</section>

{% endblock %}
